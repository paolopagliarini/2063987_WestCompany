# Docker-Compose

services:
  database:
    image:
    container_name: database
    restart: always
    environment:
      - 
    ports:
      - 
    volumes:
      - 
    healthcheck:
      test: [ "CMD" ]
      interval: 30s
      timeout: 7s
      retries: 5

  messagging:
    image:
    container_name: messagging
    restart:
    environment:
      - 
    ports:
      - 
    volumes:
      - 
    healthcheck:
      test: [ "CMD" ]
      interval: 30s
      timeout: 2s
      retries: 2

  backend:
    build: ./backend
    env_file:
      - 
    container_name: backend
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    environment:

    ports:
      - 
    depends_on:
      backend:
        condition: service_healthy
