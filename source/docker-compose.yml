      - 
    container_name: notification-service
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
