# Docker-Compose

services:

  # PostgreSQL
  database:
    image: postgres:latest
    container_name: database
    restart: always
    environment:
      POSTGRES_DB: mars_habitat
      POSTGRES_USER: mars_user
      POSTGRES_PASSWORD: mars_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready -U mars_user -d mars_habitat" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  messagging:
    image: rabbitmq:3-management
    container_name: messagging
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: mars_user
      RABBITMQ_DEFAULT_PASS: mars_password
    ports:
      - "5672:5672"  # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  ingestion:
    build: ./ingestion
    env_file:
      - 
    container_name: ingestion
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  automation-engine:
    build: ./automation-engine
    env_file:
      - 
    container_name: automation-engine
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  actuator-control-service:
    build: ./actuator-control-service
    env_file:
      - 
    container_name: actuator-control-service
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: always
    environment:
      RABBITMQ_URL: amqp://mars_user:mars_password@messagging:5672/
      EXCHANGE_NAME: mars_events
      ROUTING_KEY: events.#
      HOST: 0.0.0.0
      PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      messagging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  data-history-service:
    build: ./data-history-service
    env_file:
      - 
    container_name: data-history-service
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  rule-manager-service:
    build: ./rule-manager-service
    env_file:
      - 
    container_name: rule-manager-service
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    environment:

    ports:
      - 
    depends_on:
      automation-engine:
        condition: service_healthy
      ingestion:
        condition: service_healthy
      actuator-control-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      data-history-service:
        condition: service_healthy
      rule-manager-service:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
