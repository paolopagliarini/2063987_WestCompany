# Docker-Compose

services:

  # PostgreSQL
  database:
    image: postgres:latest
    container_name: database
    restart: always
    environment:
      POSTGRES_DB: mars_habitat
      POSTGRES_USER: mars_user
      POSTGRES_PASSWORD: mars_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD" ]
      interval: 30s
      timeout: 7s
      retries: 5

  # RabbitMQ
  messagging:
    image: rabbitmq:latest
    container_name: messagging
    restart:
    environment:
      - 
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management U
    volumes:
      - 
    healthcheck:
      test: [ "CMD" ]
      interval: 30s
      timeout: 2s
      retries: 2

  ingestion:
    build: ./ingestion
    env_file:
      - 
    container_name: ingestion
    restart: always
    environment:

    ports:
      - 
    depends_on:
      database:
        condition: service_healthy
      messagging:
        condition: service_healthy
    healthcheck:
      test: [ "CMD" ]
      interval: 800s
      timeout: 100s
      retries: 8

  automation-engine:
    build: ./automation-engine
    env_file:
      - 
    container_name: automation-engine
    restart: always
    environment:

    ports:
      - 
